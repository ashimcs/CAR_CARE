{% extends 'base.html' %}

{% block content %}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center; background: #0f172a;">
    <div style="text-align: center; max-width: 500px; padding: 40px; background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);">
        
        <div style="width: 80px; height: 80px; background: rgba(245, 158, 11, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
            <i class="fas fa-clock fa-3x" style="color: #fbbf24;"></i>
        </div>

        <h2 style="color: white; margin-bottom: 15px; font-family: 'Outfit', sans-serif;">Registration Pending</h2>
        
        <p style="color: #94a3b8; line-height: 1.6; margin-bottom: 30px;">
            Thank you for registering as a Technician. <br>
            Your account is currently <b>under review</b>. Our Admin team will verify your license and garage details shortly.
        </p>

        <div style="background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 10px; margin-bottom: 25px;">
            <small style="color: #cbd5e1;">Status: <span style="color: #fbbf24; font-weight: bold;">WAITING FOR APPROVAL</span></small>
        </div>

        <a href="{% url 'home' %}" style="display: inline-block; padding: 12px 30px; background: #3b82f6; color: white; text-decoration: none; border-radius: 10px; font-weight: bold; transition: 0.3s;">
            Return to Home
        </a>
    </div>
</div>
{% endblock %}
